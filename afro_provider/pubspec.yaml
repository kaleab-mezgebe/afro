name: afro_provider
description: AFRO Barber & Salon Provider App - Complete business management platform for barbershops and salons

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  equatable: ^2.0.5

  # Navigation
  go_router: ^17.1.0

  # UI Components
  cupertino_icons: ^1.0.2
  material_symbols_icons: ^4.2719.3
  google_fonts: ^6.2.1

  # Network & API
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  get_storage: ^2.1.1

  # Authentication
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  google_sign_in: ^7.2.0

  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0

  # Calendar & Date
  table_calendar: ^3.0.9
  intl: ^0.20.2

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # Charts & Analytics
  fl_chart: ^1.1.1
  syncfusion_flutter_charts: ^32.2.8

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  firebase_messaging: ^16.1.2

  # File Handling
  file_picker: ^10.3.10
  permission_handler: ^12.0.1

  # Utilities
  logger: ^2.0.2+1
  uuid: ^4.2.1
  url_launcher: ^6.2.2
  connectivity_plus: ^7.0.0
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8
  sizer: ^2.0.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.4
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
