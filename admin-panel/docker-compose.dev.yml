version: '3.8'

services:
  admin-panel:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3002:3002"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    restart: unless-stopped
    networks:
      - afro-network

networks:
  afro-network:
    driver: bridge
